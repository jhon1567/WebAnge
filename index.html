<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FashionHub - Clothing Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            line-height: 1.6; color: #333; background: #f8f9fa; 
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 1rem 0; position: fixed; width: 100%; top: 0;
            z-index: 1000; box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        .nav-container {
            max-width: 1200px; margin: 0 auto; display: flex;
            justify-content: space-between; align-items: center; padding: 0 2rem;
        }

        .logo { font-size: 1.8rem; font-weight: bold; }

        .cart-btn {
            background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.3);
            color: white; padding: 0.8rem 1.5rem; border-radius: 25px; cursor: pointer;
            font-size: 1rem; transition: all 0.3s ease; display: flex; align-items: center;
            gap: 0.5rem;
        }

        .cart-btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }

        .cart-count {
            background: #ff4757; color: white; border-radius: 50%; width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center; font-size: 0.8rem;
            font-weight: bold;
        }

        main { margin-top: 90px; max-width: 1200px; margin: 90px auto 0; padding: 2rem; }

        .hero { text-align: center; margin-bottom: 3rem; }
        .hero h1 {
            font-size: 2.5rem; margin-bottom: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: white; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: all 0.4s;
            cursor: pointer;
        }

        .product-card:hover { transform: translateY(-15px); box-shadow: 0 25px 50px rgba(0,0,0,0.2); }

        .product-image {
            width: 100%; height: 280px; object-fit: cover; transition: transform 0.4s;
        }

        .product-card:hover .product-image { transform: scale(1.05); }

        .product-info { padding: 1.8rem; text-align: center; }
        .product-title { font-size: 1.3rem; margin-bottom: 0.8rem; color: #2d3748; font-weight: 600; }
        .product-price { font-size: 1.8rem; font-weight: bold; color: #667eea; margin-bottom: 1.5rem; }
        .view-details-btn {
            width: 100%; padding: 1rem; background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white; border: none; border-radius: 50px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s; text-transform: uppercase;
        }
        .view-details-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(72,187,120,0.4); }

        /* PRODUCT DETAILS MODAL */
        .product-details-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 3000; backdrop-filter: blur(8px);
        }

        .product-details-content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border-radius: 25px; max-width: 800px; width: 90%; max-height: 90vh;
            overflow-y: auto; animation: modalSlideIn 0.4s;
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: translate(-50%, -55%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .product-details-header {
            padding: 2rem; border-bottom: 1px solid #eee; display: flex;
            justify-content: space-between; align-items: center;
        }

        .close-btn {
            background: none; border: none; font-size: 2.5rem; cursor: pointer;
            color: #999; width: 40px; height: 40px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; transition: all 0.3s;
        }

        .close-btn:hover { background: #f7f7f7; color: #333; }

        .product-details-main {
            display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; padding: 2rem;
        }

        .product-details-image {
            width: 100%; height: 400px; object-fit: cover; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .product-details-info h2 {
            font-size: 2.2rem; margin-bottom: 1rem; color: #2d3748;
        }

        .product-details-price {
            font-size: 2.5rem; font-weight: bold; color: #667eea; margin-bottom: 2rem;
        }

        .product-description {
            color: #666; line-height: 1.8; margin-bottom: 2rem; font-size: 1.1rem;
        }

        .option-group { margin-bottom: 2rem; }
        .option-group label {
            display: block; margin-bottom: 0.8rem; font-weight: 600; color: #2d3748;
            font-size: 1.1rem;
        }

        .size-options, .color-options { display: flex; gap: 0.8rem; flex-wrap: wrap; }

        .option-btn {
            padding: 0.8rem 1.5rem; border: 2px solid #e2e8f0; background: white;
            border-radius: 25px; cursor: pointer; transition: all 0.3s; font-weight: 500;
        }

        .option-btn.active, .option-btn:hover {
            border-color: #667eea; background: #667eea; color: white;
        }

        .color-option {
            width: 45px; height: 45px; border-radius: 50%; border: 3px solid transparent;
            cursor: pointer; transition: all 0.3s;
        }

        .color-option.active, .color-option:hover {
            border-color: #667eea; transform: scale(1.1);
        }

        .buy-now-btn {
            width: 100%; padding: 1.5rem; background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white; border: none; border-radius: 15px; font-size: 1.3rem; font-weight: 700;
            cursor: pointer; margin-top: 1.5rem; transition: all 0.3s; text-transform: uppercase;
        }

        .buy-now-btn:hover {
            transform: translateY(-3px); box-shadow: 0 15px 35px rgba(255,107,107,0.4);
        }

        /* CART MODAL */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2000; backdrop-filter: blur(5px);
        }

        .modal-content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border-radius: 20px; max-width: 550px; width: 90%;
            max-height: 85vh; overflow-y: auto;
        }

        .modal-header {
            padding: 2rem 2rem 1rem; border-bottom: 1px solid #eee; display: flex;
            justify-content: space-between; align-items: center;
        }

        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem 2rem; border-bottom: 1px solid #f0f0f0;
        }

        .cart-total {
            padding: 2rem; text-align: right; border-top: 3px solid #667eea;
            background: #f8f9fa;
        }

        .proceed-btn {
            width: 100%; padding: 1.2rem; background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white; border: none; border-radius: 12px; font-size: 1.2rem;
            font-weight: 600; cursor: pointer; margin-top: 1rem; transition: all 0.3s;
        }

        .proceed-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(40,167,69,0.4); }

        .qty-btn {
            width: 35px; height: 35px; border: 2px solid #ddd; background: white;
            border-radius: 50%; cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-weight: bold; transition: all 0.2s; margin: 0 0.5rem;
        }

        .qty-btn:hover { border-color: #667eea; color: #667eea; }

        /* Responsive */
        @media (max-width: 768px) {
            .product-details-main { grid-template-columns: 1fr; gap: 2rem; }
            .products-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo">👗 FashionHub</div>
            <button class="cart-btn" onclick="toggleCart()">
                🛒 Cart <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </header>

    <main>
        <div class="hero">
            <h1>Premium Clothing Collection</h1>
            <p style="font-size: 1.2rem; color: #666;">Click product to see details & buy</p>
        </div>
        <div class="products-grid" id="productsContainer"></div>
    </main>

    <!-- PRODUCT DETAILS MODAL -->
    <div id="productDetailsModal" class="product-details-modal">
        <div class="product-details-content">
            <div class="product-details-header">
                <h1 id="detailsTitle"></h1>
                <button class="close-btn" onclick="closeProductDetails()">&times;</button>
            </div>
            <div class="product-details-main">
                <img id="detailsImage" class="product-details-image" src="" alt="">
                <div class="product-details-info">
                    <h2 id="detailsProductName"></h2>
                    <div class="product-details-price" id="detailsPrice"></div>
                    <div class="product-description" id="detailsDescription"></div>
                    <div class="option-group">
                        <label>Size</label>
                        <div class="size-options" id="sizeOptions"></div>
                    </div>
                    <div class="option-group">
                        <label>Color</label>
                        <div class="color-options" id="colorOptions"></div>
                    </div>
                    <button class="buy-now-btn" onclick="buyNowFromDetails()">
                        🛒 Buy Now - $<span id="detailsBuyPrice"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- CART MODAL -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🛒 Shopping Cart</h2>
                <button class="close-btn" onclick="toggleCart()">&times;</button>
            </div>
            <div id="cartItemsContainer"></div>
            <div class="cart-total">
                <div>Total: $<span id="cartTotal">0.00</span></div>
                <button class="proceed-btn" id="checkoutBtn" onclick="openCheckout()" style="display: none;">
                    Proceed to Checkout
                </button>
            </div>
        </div>
    </div>

    <!-- CHECKOUT MODAL -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>💳 Checkout</h2>
                <button class="close-btn" onclick="closeCheckout()">&times;</button>
            </div>
            <form id="checkoutForm" style="padding: 2rem;">
                <div style="background: #f8f9fa; padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; border-left: 4px solid #667eea;">
                    <h3>Order Summary</h3>
                    <div>Total: $<span id="orderTotal">0.00</span></div>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Full Name *</label>
                    <input type="text" id="customerName" required style="width: 100%; padding: 1rem; border: 2px solid #e2e8f0; border-radius: 12px;">
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Email *</label>
                    <input type="email" id="customerEmail" required style="width: 100%; padding: 1rem; border: 2px solid #e2e8f0; border-radius: 12px;">
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Address *</label>
                    <textarea id="customerAddress" rows="3" required style="width: 100%; padding: 1rem; border: 2px solid #e2e8f0; border-radius: 12px;"></textarea>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Card Number *</label>
                    <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" required style="width: 100%; padding: 1rem; border: 2px solid #e2e8f0; border-radius: 12px;">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Expiry (MM/YY) *</label>
                        <input type="text" id="expiryDate" placeholder="12/25" maxlength="5" required style="width: 100%; padding: 1rem; border: 2px solid #e2e8f0; border-radius: 12px;">
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">CVV *</label>
                        <input type="text" id="cvv" placeholder="123" maxlength="4" required style="width: 100%; padding: 1rem; border: 2px solid #e2e8f0; border-radius: 12px;">
                    </div>
                </div>
                <button type="submit" class="proceed-btn">Complete Order</button>
            </form>
            <div id="successMessage" style="text-align: center; padding: 3rem 2rem; background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%); border-radius: 12px; display: none;">
                <div style="font-size: 4rem; margin-bottom: 1rem;">✅</div>
                <h2>Order Placed Successfully!</h2>
                <p>Thank you for shopping with FashionHub!</p>
            </div>
        </div>
    </div>

    <script>
        const products = [
            {
                id: 1, name: "Classic T-Shirt", price: 29.99,
                image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500&h=400&fit=crop",
                description: "Premium 100% cotton t-shirt. Soft, breathable, durable.",
                sizes: ["XS", "S", "M", "L", "XL"], colors: ["#ecf0f1", "#000000", "#667eea"],
                selectedSize: "M", selectedColor: "#ecf0f1"
            },
            {
                id: 2, name: "Slim Fit Jeans", price: 69.99,
                image: "https://images.unsplash.com/photo-1542272604-787c3835535d?w=500&h=400&fit=crop",
                description: "Authentic slim fit jeans with stretch. Comfortable all-day.",
                sizes: ["28", "30", "32", "34", "36"], colors: ["#2c3e50",],
                selectedSize: "32", selectedColor: "#2c3e50"
            },
            {
                id: 3, name: "Black Leather Jacket", price: 149.99,
                image: "https://images.unsplash.com/photo-1551028719-00167b16eac5?w=500&h=400&fit=crop",
                description: "Genuine leather biker jacket. Fully lined, zippered pockets.",
                sizes: ["S", "M", "L", "XL"], colors: ["#2c3e50",],
                selectedSize: "M", selectedColor: "#2c3e50"
            },
            {
                id: 4, name: "Floral Summer Dress", price: 59.99,
                image: "https://img.ltwebstatic.com/images3_pi/2021/06/10/1623309511ddb0e63f2c41092dc8b8fa40727094a1_thumbnail_720x.webp",
                description: "Lightweight chiffon dress. Perfect for summer events.",
                sizes: ["XS", "S", "M", "L"], colors: [ "#ecf0f1","#e74c3c", "#f39c12"],
                selectedSize: "S", selectedColor: "#e74c3c"
            },
            {
                id: 5, name: "Sneakers", price: 89.99,
                image: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=500&h=400&fit=crop",
                description: "Premium leather sneakers. Cushioned sole, breathable.",
                sizes: ["7", "8", "9", "10"], colors: ["#ecf0f1", "#3498db"],
                selectedSize: "9", selectedColor: "#ecf0f1"
            },
            {
                id: 6, name: "Oversized Hoodie", price: 49.99,
                image: "https://image.made-in-china.com/2f0j00gktcJmyanzoP/Wholesale-Custom-Heavy-Weight-Hoodie-Good-Quality-No-Strings-100-Cotton-Hoodie-Oversized-Embroidery-Thick-Heavy-450-GSM-Men-s-Hoodies.jpg",
                description: "Cozy oversized fleece hoodie. Kangaroo pocket.",
                sizes: ["S", "M", "L", "XL"], colors: ["#ecf0f1", "#9b59b6", "#e67e22"],
                selectedSize: "M", selectedColor: "#9b59b6"
            }
        ];

        let cart = [];
        let currentProduct = null;

        document.addEventListener('DOMContentLoaded', function() {
            renderProducts();
            updateCartDisplay();
        });

        function renderProducts() {
            document.getElementById('productsContainer').innerHTML = products.map(product => `
                <div class="product-card" onclick="openProductDetails(${product.id})">
                    <img src="${product.image}" alt="${product.name}" class="product-image" loading="lazy">
                    <div class="product-info">
                        <h3 class="product-title">${product.name}</h3>
                        <div class="product-price">$${product.price.toFixed(2)}</div>
                        <button class="view-details-btn">View Details</button>
                    </div>
                </div>
            `).join('');
        }

        function openProductDetails(productId) {
            currentProduct = {...products.find(p => p.id === productId)}; // Clone object
            document.getElementById('productDetailsModal').style.display = 'block';
            
            document.getElementById('detailsTitle').textContent = currentProduct.name;
            document.getElementById('detailsProductName').textContent = currentProduct.name;
            document.getElementById('detailsPrice').textContent = `$${currentProduct.price.toFixed(2)}`;
            document.getElementById('detailsImage').src = currentProduct.image;
            document.getElementById('detailsDescription').textContent = currentProduct.description;
            document.getElementById('detailsBuyPrice').textContent = currentProduct.price.toFixed(2);
            
            renderSizeOptions();
            renderColorOptions();
        }

        function closeProductDetails() {
            document.getElementById('productDetailsModal').style.display = 'none';
        }

        function renderSizeOptions() {
            document.getElementById('sizeOptions').innerHTML = currentProduct.sizes.map(size => `
                <div class="option-btn ${currentProduct.selectedSize === size ? 'active' : ''}" 
                     onclick="selectSize('${size}')">${size}</div>
            `).join('');
        }

        function renderColorOptions() {
            document.getElementById('colorOptions').innerHTML = currentProduct.colors.map(color => `
                <div class="color-option ${currentProduct.selectedColor === color ? 'active' : ''}" 
                     style="background-color: ${color};" onclick="selectColor('${color}')"></div>
            `).join('');
        }

        function selectSize(size) {
            currentProduct.selectedSize = size;
            renderSizeOptions();
        }

        function selectColor(color) {
            currentProduct.selectedColor = color;
            renderColorOptions();
        }

        function buyNowFromDetails() {
            const productToAdd = {
                ...currentProduct,
                quantity: 1,
                selectedSize: currentProduct.selectedSize,
                selectedColor: currentProduct.selectedColor
            };
            cart.push(productToAdd);
            updateCartDisplay();
            closeProductDetails();
            showNotification(`${currentProduct.name} (${currentProduct.selectedSize}) added to cart!`);
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId && 
                item.selectedSize === product.selectedSize && item.selectedColor === product.selectedColor);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartDisplay();
        }

        function updateCartDisplay() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
            renderCartItems();
        }

        function renderCartItems() {
            const container = document.getElementById('cartItemsContainer');
            const checkoutBtn = document.getElementById('checkoutBtn');
            const totalEl = document.getElementById('cartTotal');
            
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align: center; padding: 2rem; color: #666;">Your cart is empty</p>';
                checkoutBtn.style.display = 'none';
                totalEl.textContent = '0.00';
                return;
            }
            
            container.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div style="display: flex; align-items: center; gap: 1rem; flex: 1;">
                        <img src="${item.image}" alt="${item.name}" style="width: 60px; height: 60px; object-fit: cover; border-radius: 8px;">
                        <div>
                            <h4 style="margin: 0 0 0.5rem 0;">${item.name}</h4>
                            <small style="color: #666;">Size: ${item.selectedSize || 'M'} | 
                                <span style="background: ${item.selectedColor || '#667eea'}; padding: 2px 6px; border-radius: 4px; color: white; font-size: 0.8rem;">●</span>
                            </small>
                            <div style="margin-top: 0.5rem; display: flex; align-items: center;">
                                <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
                                <span style="font-weight: bold; margin: 0 1rem; min-width: 20px;">${item.quantity}</span>
                                <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                    <div style="text-align: right; font-weight: bold; font-size: 1.2rem;">
                        $${(item.price * item.quantity).toFixed(2)}
                    </div>
                </div>
            `).join('');
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            totalEl.textContent = total.toFixed(2);
            checkoutBtn.style.display = 'block';
        }

        function updateQuantity(productId, change) {
            const itemIndex = cart.findIndex(item => item.id === productId);
            if (itemIndex !== -1) {
                cart[itemIndex].quantity += change;
                if (cart[itemIndex].quantity <= 0) {
                    cart.splice(itemIndex, 1);
                }
                updateCartDisplay();
            }
        }

        function toggleCart() {
            const modal = document.getElementById('cartModal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
            if (modal.style.display === 'block') renderCartItems();
        }

        function openCheckout() {
            document.getElementById('cartModal').style.display = 'none';
            document.getElementById('checkoutModal').style.display = 'block';
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('orderTotal').textContent = total.toFixed(2);
        }

        function closeCheckout() {
            document.getElementById('checkoutModal').style.display = 'none';
            document.getElementById('checkoutForm').style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }

        document.getElementById('checkoutForm').addEventListener('submit', function(e) {
            e.preventDefault();
            this.style.display = 'none';
            setTimeout(() => {
                document.getElementById('successMessage').style.display = 'block';
                cart = [];
                updateCartDisplay();
            }, 1000);
        });

        document.getElementById('cardNumber').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\s/g, '').replace(/[^0-9]/gi, '');
            let parts = [];
            for (let i = 0, len = value.length; i < len; i += 4) {
                parts.push(value.substring(i, i + 4));
            }
            e.target.value = parts.join(' ');
        });

        window.addEventListener('click', function(e) {
            if (e.target.id === 'productDetailsModal' || e.target.id === 'cartModal' || e.target.id === 'checkoutModal') {
                e.target.style.display = 'none';
            }
        });

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed; top: 100px; right: 20px; background: #28a745; color: white;
                padding: 1rem 2rem; border-radius: 10px; box-shadow: 0 10px 30px rgba(40,167,69,0.4);
                z-index: 4000; transform: translateX(400px); transition: transform 0.3s;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.style.transform = 'translateX(0)', 100);
            setTimeout(() => notification.remove(), 3000);
        }
    </script>
</body>
</html>
